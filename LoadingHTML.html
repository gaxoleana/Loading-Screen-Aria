<!DOCTYPE html>

<head>

    <title>Loading Screen Aria</title>

<body>
    <div id="stars"></div>
    <div id="stars2"></div>

                <span style="--i:19;"></span><span style="--i:20;"></span>
            </div>

            <div class="loading-text">
                <span style="--i:1;">L</span><span style="--i:2;">o</span><span style="--i:3;">a</span>
                <span style="--i:4;">d</span><span style="--i:5;">i</span><span style="--i:6;">n</span>

        </div>

</html>
